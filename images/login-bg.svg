<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f8ff" />
      <stop offset="100%" stop-color="#e6f7ff" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39B49A" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#39B49A" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#39B49A" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰波浪 -->
  <path d="M0,200 C300,100 600,300 900,200 C1200,100 1500,300 1920,200 L1920,1080 L0,1080 Z" fill="url(#waveGradient)" />
  <path d="M0,400 C300,300 600,500 900,400 C1200,300 1500,500 1920,400 L1920,1080 L0,1080 Z" fill="url(#waveGradient)" opacity="0.7" />
  
  <!-- 装饰圆点 -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="10" fill="#39B49A" />
    <circle cx="200" cy="300" r="15" fill="#39B49A" />
    <circle cx="1700" cy="150" r="8" fill="#39B49A" />
    <circle cx="1800" cy="400" r="12" fill="#39B49A" />
    <circle cx="500" cy="800" r="20" fill="#39B49A" />
    <circle cx="1400" cy="700" r="18" fill="#39B49A" />
    <circle cx="800" cy="200" r="5" fill="#39B49A" />
    <circle cx="1200" cy="300" r="7" fill="#39B49A" />
  </g>
  
  <!-- 装饰线条 -->
  <g stroke="#39B49A" stroke-width="2" opacity="0.05">
    <line x1="0" y1="500" x2="200" y2="700" />
    <line x1="1700" y1="300" x2="1920" y2="500" />
    <line x1="300" y1="900" x2="500" y2="1080" />
    <line x1="1400" y1="800" x2="1600" y2="950" />
  </g>
</svg> 